<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Focus Shield</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Duolingo-Inspired Light Palette */
      --bg-color: #FFF9E5;
      /* Soft Cream Background */
      --card-bg: #FFFFFF;
      /* Pure White Cards */
      --primary: #58CC02;
      /* Focus Green */
      --primary-dark: #46A302;
      /* Green Shadow */
      --secondary: #1CB0F6;
      /* Friendly Blue */
      --secondary-dark: #1899D6;
      /* Blue Shadow */
      --accent: #FF9600;
      /* Streak Orange */
      --text-main: #4B4B4B;
      /* Soft Dark Grey (never pure black) */
      --text-muted: #777777;
      /* Lighter Grey */
      --border: #E5E5E5;
      /* Soft Grey Border */
      --input-bg: #F7F7F7;
      /* Light Grey Input */
      --danger: #FF4B4B;
      /* Soft Red */
      --danger-dark: #EA2B2B;
      /* Red Shadow */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      /* Nunito is a great free font that looks like Duolingo's. 
     If you don't have it, this falls back to rounded system fonts. */
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      width: 350px;
      background: var(--bg-color);
      color: var(--text-main);
      padding: 1.25rem;
      font-size: 15px;
      overflow-y: auto;
      /* Optional: Add a subtle pattern or keep solid */
    }

    header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      /* Removed heavy border, added soft spacing */
      padding-bottom: 0.5rem;
    }

    .logo-container {
      background: #E5FCC2;
      /* Light Green BG */
      color: var(--primary);
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      border: 2px solid #B8F28A;
      /* Soft border */
    }

    .logo-text {
      font-weight: 800;
      font-size: 1.2rem;
      color: var(--primary);
      letter-spacing: -0.02em;
      /* Removed gradient text, solid color is friendlier */
    }

    /* Transformed Pro Badge to look like a Fun Star/Bonus */
    .pro-badge-top {
      font-size: 10px;
      font-weight: 800;
      color: #FFF;
      background: var(--accent);
      /* Orange */
      border: none;
      padding: 2px 8px;
      border-radius: 9999px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-left: auto;
      box-shadow: 0 4px 0 #E08300;
      /* 3D effect */
      transform: translateY(0);
      transition: transform 0.1s;
    }

    .section-title {
      font-size: 0.85rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      margin-top: 0.5rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .input-wrapper {
      position: relative;
    }

    input[type="text"] {
      width: 100%;
      background: var(--input-bg);
      border: 2px solid var(--border);
      border-radius: 16px;
      /* Very rounded */
      padding: 0.85rem 1rem;
      color: var(--text-main);
      font-size: 15px;
      font-weight: 600;
      transition: all 0.2s ease;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: var(--secondary);
      background: #FFF;
      box-shadow: 0 0 0 3px rgba(28, 176, 246, 0.2);
    }

    .preset-container {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .preset-btn {
      background: var(--card-bg);
      border: 2px solid var(--border);
      border-bottom: 4px solid var(--border);
      /* 3D effect */
      color: var(--text-main);
      border-radius: 12px;
      padding: 0.6rem 0;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.1s ease;
    }

    .preset-btn:hover {
      background: #F7F7F7;
      transform: translateY(-1px);
    }

    .preset-btn:active {
      transform: translateY(2px);
      border-bottom-width: 2px;
    }

    .preset-btn.active {
      background: #E5FCC2;
      border-color: var(--primary);
      border-bottom-color: var(--primary-dark);
      color: var(--primary-dark);
    }

    .btn-submit {
      width: 100%;
      background: var(--primary);
      color: #FFF;
      border: none;
      border-bottom: 5px solid var(--primary-dark);
      /* Thick 3D bottom */
      border-radius: 24px;
      /* Pill shape */
      padding: 1rem;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.1s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 0.5rem;
    }

    .btn-submit:hover {
      background: #61E002;
      /* Slightly lighter green */
      transform: translateY(-1px);
    }

    .btn-submit:active {
      transform: translateY(4px);
      border-bottom-width: 1px;
      /* Press down effect */
    }

    .block-list-container {
      margin-top: 1.5rem;
      border-top: 2px dashed var(--border);
      padding-top: 1.25rem;
    }

    .empty-state {
      padding: 1.5rem 1rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 600;
      background: #F0F0F0;
      border-radius: 16px;
      border: 2px dashed var(--border);
    }

    .block-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--card-bg);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 0.75rem;
      margin-bottom: 0.75rem;
      animation: slideIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      /* Bouncy animation */
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: scale(0.9) translateY(10px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .block-info {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      max-width: 75%;
    }

    .block-domain {
      font-weight: 800;
      font-size: 14px;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .block-time {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 700;
    }

    .btn-delete {
      background: #FFF;
      border: 2px solid var(--border);
      border-bottom: 4px solid var(--border);
      color: var(--danger);
      cursor: pointer;
      padding: 0.4rem;
      border-radius: 12px;
      transition: all 0.1s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 12px;
    }

    .btn-delete:hover {
      background: #FFE5E5;
      border-color: var(--danger);
      border-bottom-color: var(--danger-dark);
      color: var(--danger-dark);
      transform: translateY(-1px);
    }

    .btn-delete:active {
      transform: translateY(2px);
      border-bottom-width: 2px;
    }

    .footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 700;
    }

    .alert {
      padding: 0.75rem;
      border-radius: 16px;
      margin-bottom: 1rem;
      font-size: 13px;
      font-weight: 700;
      display: none;
      border: 2px solid transparent;
    }

    .alert-success {
      background: #E5FCC2;
      border-color: var(--primary);
      color: var(--primary-dark);
    }

    .alert-error {
      background: #FFE5E5;
      border-color: var(--danger);
      color: var(--danger-dark);
    }
  </style>
</head>

<body>

  <header>
    <div class="logo-container">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
      </svg>
    </div>
    <div class="logo-text">Focus Shield</div>
    <div class="pro-badge-top">Pro</div>
  </header>

  <div class="alert alert-success" id="success-alert"></div>
  <div class="alert alert-error" id="error-alert"></div>

  <div class="form-group">
    <div class="section-title">Website to Block</div>
    <input type="text" id="domain-input" placeholder="e.g., facebook.com" autocomplete="off" />
  </div>

  <div class="form-group">
    <div class="section-title">Focus Duration</div>
    <div class="preset-container">
      <button class="preset-btn active" data-minutes="1">1 Min</button>
      <button class="preset-btn" data-minutes="15">15 Min</button>
      <button class="preset-btn" data-minutes="30">30 Min</button>
      <button class="preset-btn" data-minutes="60">60 Min</button>
    </div>
  </div>

  <button class="btn-submit" id="start-focus-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
      stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10" />
      <polyline points="12 6 12 12 16 14" />
    </svg>
    Start Focus Session
  </button>

  <div class="block-list-container">
    <div class="section-title">Active Focus Blocks</div>
    <div id="empty-state" class="empty-state">
      No websites are blocked. Let's focus!
    </div>
    <div id="block-list"></div>
  </div>

  <div class="footer">
    Focus Shield © 2026. Made for deep work.
  </div>

  <script src="popup.js"></script>
</body>

</html>
